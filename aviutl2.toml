#:schema ./.aviutl2-cli/aviutl2.schema.json
# 設定ファイルについては https://github.com/sevenc-nanashi/aviutl2-cli を参照してください。
[project]
id = "sevenc-nanashi.ffmpeg-aui2"
name = "ffmpeg.aui2"
version = "0.1.0"

[development]
aviutl2_version = "latest"

[artifacts.ffmpeg_aui2-aui2]
destination = "Plugin/ffmpeg_aui2.aui2"

[artifacts.ffmpeg_aui2-aui2.profiles.debug]
build = "cargo build"
source = "target/debug/ffmpeg_aui2.dll"

[artifacts.ffmpeg_aui2-aui2.profiles.release]
build = "cargo build --release"
source = "target/release/ffmpeg_aui2.dll"